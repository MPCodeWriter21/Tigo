# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

project_name: tigo

env:
  - CGO_ENABLED=0

before:
  hooks:
    - go mod tidy

builds:
  - id: tigo
    main: ./cmd/tigo
    binary: tigo
    ldflags:
      - -s -w -X main.version={{.Version}}
    targets:
      - linux_amd64
      - linux_arm_6
      - linux_arm_7
      - linux_arm64
      - windows_amd64
      - windows_arm64
      - darwin_amd64
      - darwin_arm64
      - freebsd_amd64
      - freebsd_arm64
      - netbsd_amd64
      - netbsd_arm64
      - android_arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - man/tigo.1

nfpms:
  - id: packages
    package_name: tigo
    file_name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}
    vendor: Mehrad Pooryoussof
    homepage: https://github.com/MPCodeWriter21/Tigo
    maintainer: Mehrad Pooryoussof <CodeWriter21@gmail.com>
    description: |-
      Terminal-based TODO/task management program.
      Tigo stores tasks as TASK.md files in timestamped directories,
      making them grep-able, diff-able, and git-friendly.
    license: MIT
    section: utils
    contents:
      - src: ./man/tigo.1
        dst: '{{ if eq .Format "termux.deb" }}/data/data/com.termux/files{{ end }}/usr/share/man/man1/tigo.1'
        file_info:
          mode: 0644
    formats:
      - apk
      - deb
      - ipk
      - rpm
      - archlinux
      - termux.deb
    rpm:
      group: Applications/System
      summary: Terminal-based TODO/task management program

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: MPCodeWriter21
    name: Tigo
  draft: true

changelog:
  use: github
  abbrev: -1
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
