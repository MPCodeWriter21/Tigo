name: tigo
arch: "${GOARCH}"
platform: linux
version: "${VLESS_VERSION}"
section: utils
maintainer: Mehrad Pooryoussof <CodeWriter21@gmail.com>
description: |-
  Terminal-based TODO/task management program.
  Tigo is a terminal-based TODO/task management program that stores tasks
  as TASK.md files in timestamped directories, making them grep-able,
  diff-able, and git-friendly.
homepage: https://github.com/MPCodeWriter21/Tigo
license: MIT

rpm:
  group: Applications/System
  summary: Terminal-based TODO/task management program

contents:
  - src: ./tigo
    dst: /usr/bin/tigo
    file_info:
      mode: 0755

  - src: ./man/tigo.1
    dst: /usr/share/man/man1/tigo.1
    file_info:
      mode: 0644
