name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: windows-latest
    environment: release environment
    steps:
      - name: Validate Chocolatey API key
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $key = $env:CHOCOLATEY_API_KEY
          if (-not $key) {
            throw "CHOCOLATEY_API_KEY is not set or empty"
          }
          Write-Output "CHOCOLATEY_API_KEY is set"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Go version
        id: go_version
        shell: bash
        run: awk '{if($1 == "go") print "version=" $2}' go.mod >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.version }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Chocolatey
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem -Path "${{ github.workspace }}\dist\*.nupkg" | Select-Object -First 1
          if (-not $nupkg) {
            Write-Error "No .nupkg found in dist/"
            exit 1
          }
          choco push $nupkg.FullName --key $env:CHOCOLATEY_API_KEY --source https://push.chocolatey.org/
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
