name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. v0.1.0). Uses git tag if empty."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: freebsd
            arch: amd64
          - os: freebsd
            arch: arm64
          - os: netbsd
            arch: amd64
          - os: netbsd
            arch: arm64
          - os: android
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          output="tigo-${VERSION}-${GOOS}-${GOARCH}${ext}"
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${VERSION}" -o "$output" ./cmd/tigo
          echo "artifact=$output" >> "$GITHUB_ENV"
          echo "Binaries built"

      - uses: actions/upload-artifact@v4
        with:
          name: tigo-${{ matrix.os }}-${{ matrix.arch }}
          path: tigo-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tigo-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-artifacts
          sha256sum tigo-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          name: Tigo ${{ inputs.version || github.ref_name }}
          body: |
            ## Tigo ${{ inputs.version || github.ref_name }}

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for installation and usage.

            ### Checksums

            ```
            $(cat release-artifacts/checksums.txt)
            ```
          draft: true
          prerelease: false
          files: release-artifacts/*
