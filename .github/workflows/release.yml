name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. v0.1.0). Uses git tag if empty."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: freebsd
            arch: amd64
          - os: freebsd
            arch: arm64
          - os: netbsd
            arch: amd64
          - os: netbsd
            arch: arm64
          - os: android
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Go version
        id: go_version
        run: awk '{if($1 == "go") print "version=" $2}' go.mod >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{steps.version.outputs.go_version}}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          output="tigo-${VERSION}-${GOOS}-${GOARCH}${ext}"
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "$output" \
            ./cmd/tigo

      - uses: actions/upload-artifact@v4
        with:
          name: tigo-${{ matrix.os }}-${{ matrix.arch }}
          path: tigo-*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tigo-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        id: checksums
        shell: bash
        run: |
          cd release-artifacts
          sha256sum tigo-* | tee checksums.txt
          {
            echo "body<<CHEOF"
            cat checksums.txt
            echo "CHEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          name: Tigo ${{ inputs.version || github.ref_name }}
          body: |
            ## Tigo ${{ inputs.version || github.ref_name }}

            See the [README](https://github.com/${{ github.repository }}/blob/master/README.md) for installation and usage.

            ### Checksums

            ```
            ${{ steps.checksums.outputs.body }}
            ```
          draft: true
          prerelease: false
          files: release-artifacts/*
